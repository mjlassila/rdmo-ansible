---
- name: Deploy RDMO sites
  hosts: rhel9:almalinux9

  tasks:
    - name: Configure RDMO sites from legacy variables
      ansible.builtin.set_fact:
        rdmo_sites_effective:
          - host: "{{ rdmo_host }}"
            service: "{{ rdmo_service }}"
            app_repo: "{{ rdmo_app_repo }}"
            app_path: "{{ rdmo_app_path }}"
            dist: "{{ rdmo_dist }}"
            user: "{{ rdmo_user }}"
            home: "{{ rdmo_home }}"
            venv: "{{ rdmo_venv }}"
            dbname: "{{ rdmo_dbname }}"
            django_secret_key: "{{ django_secret_key }}"
      when: rdmo_sites is not defined

    - name: Configure RDMO sites
      ansible.builtin.set_fact:
        rdmo_sites_effective: "{{ rdmo_sites }}"
      when: rdmo_sites is defined

    - name: Configure unique RDMO virtual environments
      ansible.builtin.set_fact:
        rdmo_virtualenvs_effective: []

    - name: Configure unique RDMO database roles
      ansible.builtin.set_fact:
        rdmo_database_roles_effective: []

    - name: Add unique RDMO virtual environments
      ansible.builtin.set_fact:
        rdmo_virtualenvs_effective: >-
          {{ rdmo_virtualenvs_effective + [{'venv': item.venv | default(rdmo_venv),
          'user': item.user | default(rdmo_user), 'dist': item.dist | default(rdmo_dist)}] }}
      when: (item.venv | default(rdmo_venv)) not in (rdmo_virtualenvs_effective | map(attribute='venv') | list)
      loop: "{{ rdmo_sites_effective }}"
      loop_control:
        label: "{{ item.venv | default(rdmo_venv) }}"

    - name: Add unique RDMO database roles
      ansible.builtin.set_fact:
        rdmo_database_roles_effective: >-
          {{ rdmo_database_roles_effective + [{'dbuser': item.dbuser | default(rdmo_dbuser | default(rdmo_user))}] }}
      when: (item.dbuser | default(rdmo_dbuser | default(rdmo_user))) not in (rdmo_database_roles_effective | map(attribute='dbuser') | list)
      loop: "{{ rdmo_sites_effective }}"
      loop_control:
        label: "{{ item.dbuser | default(rdmo_dbuser | default(rdmo_user)) }}"

    - name: Verify supported operating system
      ansible.builtin.assert:
        that:
          - ansible_distribution in ['RedHat', 'AlmaLinux']
          - ansible_distribution_major_version | int == 9
        fail_msg: This playbook targets RHEL 9 or AlmaLinux 9 hosts.
        success_msg: Target host is a supported RHEL 9 family system.

    - name: Enable EPEL repository
      ansible.builtin.dnf:
        name: epel-release
        state: present

    - name: Install distribution packages
      ansible.builtin.dnf:
        name:
          - gcc
          - make
          - libxml2-devel
          - libxslt-devel
          - zlib-devel
          - python3-devel
          - python3-pip
          - python3-psycopg2
          - git
          - nginx
          - postgresql
          - postgresql-server
          - pandoc
          - texlive-scheme-basic
          - texlive-xetex
          - texlive-lm
          - librsvg2-tools
          - certbot
          - python3-certbot-nginx
          - acl
        state: present

    - name: Initialize PostgreSQL database cluster
      ansible.builtin.command:
        cmd: postgresql-setup --initdb
        creates: /var/lib/pgsql/data/PG_VERSION

    - name: Enable and start PostgreSQL
      ansible.builtin.systemd_service:
        name: postgresql
        enabled: true
        state: started

    - name: Enable and start nginx
      ansible.builtin.systemd_service:
        name: nginx
        enabled: true
        state: started

    - name: Create rdmo users
      ansible.builtin.user:
        name: "{{ item.user | default(rdmo_user) }}"
        home: "{{ item.home | default(rdmo_home) }}"
        comment: RDMO user
        shell: /bin/bash
        create_home: true
        state: present
      loop: "{{ rdmo_sites_effective }}"
      loop_control:
        label: "{{ item.user | default(rdmo_user) }}"

    # nginx

    - name: Create nginx webroot directories
      ansible.builtin.file:
        path: "/var/www/{{ item.host }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop: "{{ rdmo_sites_effective }}"
      loop_control:
        label: "{{ item.host }}"

    - name: Check for existing RDMO certificates
      ansible.builtin.stat:
        path: "/etc/letsencrypt/live/{{ item.host }}/cert.pem"
      loop: "{{ rdmo_sites_effective }}"
      loop_control:
        label: "{{ item.host }}"
      register: rdmo_certificate_stats

    - name: Create Let's Encrypt configuration directory
      ansible.builtin.file:
        path: /etc/letsencrypt
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deploy Certbot nginx SSL options file
      ansible.builtin.copy:
        dest: /etc/letsencrypt/options-ssl-nginx.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          # This file contains important security parameters. If you modify this file
          # manually, Certbot will be unable to automatically provide future security
          # updates. Instead, Certbot will print and log an error message with a path to
          # the up-to-date file that you will need to refer to when manually updating
          # this file. Contents are based on https://ssl-config.mozilla.org

          ssl_session_cache shared:le_nginx_SSL:10m;
          ssl_session_timeout 1440m;
          ssl_session_tickets off;

          ssl_protocols TLSv1.2 TLSv1.3;
          ssl_prefer_server_ciphers off;

          ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";

    - name: Deploy Certbot SSL DH parameters file
      ansible.builtin.copy:
        dest: /etc/letsencrypt/ssl-dhparams.pem
        owner: root
        group: root
        mode: "0644"
        content: |
          -----BEGIN DH PARAMETERS-----
          MIIBCAKCAQEA//////////+t+FRYortKmq/cViAnPTzx2LnFg84tNpWp4TZBFGQz
          +8yTnc4kmz75fS/jY2MMddj2gbICrsRhetPfHtXV/WVhJDP1H18GbtCFY2VVPe0a
          87VXE15/V8k1mE8McODmi3fipona8+/och3xWKE2rec1MKzKT0g6eXq8CrGCsyT7
          YdEIqUuyyOP7uWrat2DX9GgdT0Kj3jlN9K5W7edjcrsZCwenyO4KbXCeAvzhzffi
          7MA0BM0oNC9hkXL+nOmFg/+OTxIy7vKBg8P+OxtMb61zO7X8vC7CIAXFjvGDfRaD
          ssbzSibBsu/6iGtCOGEoXJf//////////wIBAg==
          -----END DH PARAMETERS-----

    - name: Deploy temporary nginx webroot config files
      ansible.builtin.copy:
        dest: "/etc/nginx/conf.d/{{ item.item.host }}.acme.conf"
        owner: root
        group: root
        mode: "0644"
        content: |
          server {
              listen 80;
              listen [::]:80;
              server_name {{ item.item.host }};

              root /var/www/{{ item.item.host }};

              location /.well-known/acme-challenge/ {
                  root /var/www/{{ item.item.host }};
              }

              location / {
                  return 404;
              }
          }
      when: not item.stat.exists
      loop: "{{ rdmo_certificate_stats.results }}"
      loop_control:
        label: "{{ item.item.host }}"
      notify: Restart nginx

    - name: Flush handlers before obtaining certificates
      ansible.builtin.meta: flush_handlers

    - name: Obtain certificates for RDMO sites
      ansible.builtin.command:
        cmd: >-
          certbot certonly --webroot --webroot-path /var/www/{{ item.item.host }}
          -d {{ item.item.host }} --non-interactive --agree-tos --email {{ certbot_email }}
        creates: "/etc/letsencrypt/live/{{ item.item.host }}/cert.pem"
      when: not item.stat.exists
      loop: "{{ rdmo_certificate_stats.results }}"
      loop_control:
        label: "{{ item.item.host }}"

    - name: Remove temporary nginx webroot config files
      ansible.builtin.file:
        path: "/etc/nginx/conf.d/{{ item.item.host }}.acme.conf"
        state: absent
      when: not item.stat.exists
      loop: "{{ rdmo_certificate_stats.results }}"
      loop_control:
        label: "{{ item.item.host }}"
      notify: Restart nginx

    - name: Deploy nginx config files
      ansible.builtin.template:
        src: templates/rdmo.conf
        dest: "/etc/nginx/conf.d/{{ rdmo_site.host }}.conf"
        owner: root
        group: root
        mode: "0644"
      loop: "{{ rdmo_sites_effective }}"
      loop_control:
        label: "{{ rdmo_site.host }}"
        loop_var: rdmo_site
      notify: Restart nginx

    - name: Flush handlers after deploying nginx configs
      ansible.builtin.meta: flush_handlers

    # systemd

    - name: Deploy systemd service files
      ansible.builtin.template:
        src: templates/rdmo.service
        dest: "/etc/systemd/system/{{ rdmo_site.service }}.service"
        owner: root
        group: root
        mode: "0644"
      loop: "{{ rdmo_sites_effective }}"
      loop_control:
        label: "{{ rdmo_site.service }}"
        loop_var: rdmo_site
      notify: Restart rdmo

    - name: Create log directories
      ansible.builtin.file:
        path: "/var/log/django/{{ item.service }}"
        state: directory
        owner: "{{ item.user | default(rdmo_user) }}"
        group: "{{ item.user | default(rdmo_user) }}"
        mode: "0755"
      loop: "{{ rdmo_sites_effective }}"
      loop_control:
        label: "{{ item.service }}"

    # postgres

    - name: Create rdmo postgres users
      become: true
      become_user: postgres
      community.postgresql.postgresql_user:
        name: "{{ item.dbuser }}"
        role_attr_flags: CREATEDB,NOSUPERUSER
      loop: "{{ rdmo_database_roles_effective }}"
      loop_control:
        label: "{{ item.dbuser }}"

    - name: Create rdmo postgres databases
      become: true
      become_user: postgres
      community.postgresql.postgresql_db:
        name: "{{ item.dbname | default(rdmo_dbname) }}"
        owner: "{{ item.dbuser | default(rdmo_dbuser | default(rdmo_user)) }}"
      loop: "{{ rdmo_sites_effective }}"
      loop_control:
        label: "{{ item.dbname | default(rdmo_dbname) }}"

    # rdmo-app

    - name: Clone rdmo-app repositories
      become: true
      become_user: "{{ item.user | default(rdmo_user) }}"
      ansible.builtin.git:
        repo: "{{ item.app_repo | default(rdmo_app_repo) }}"
        dest: "{{ item.app_path }}"
        version: main
        accept_hostkey: true
      loop: "{{ rdmo_sites_effective }}"
      loop_control:
        label: "{{ item.app_path }}"

    - name: Create virtual environments
      become: true
      become_user: "{{ item.user }}"
      ansible.builtin.command:
        cmd: "python3 -m venv {{ item.venv }}"
        creates: "{{ item.venv }}/bin/activate"
      loop: "{{ rdmo_virtualenvs_effective }}"
      loop_control:
        label: "{{ item.venv }}"

    - name: Upgrade pip inside virtualenvs
      become: true
      become_user: "{{ item.user }}"
      ansible.builtin.pip:
        name: pip
        state: present
        virtualenv: "{{ item.venv }}"
        virtualenv_command: python3 -m venv
      loop: "{{ rdmo_virtualenvs_effective }}"
      loop_control:
        label: "{{ item.venv }}"

    - name: Install rdmo inside virtualenvs
      become: true
      become_user: "{{ item.user }}"
      ansible.builtin.pip:
        name: "{{ item.dist }}"
        state: present
        virtualenv: "{{ item.venv }}"
        virtualenv_command: python3 -m venv
      loop: "{{ rdmo_virtualenvs_effective }}"
      loop_control:
        label: "{{ item.venv }}"

    - name: Deploy local.py config files
      become: true
      become_user: "{{ rdmo_site.user | default(rdmo_user) }}"
      ansible.builtin.template:
        src: templates/local.py
        dest: "{{ rdmo_site.app_path }}/config/settings/local.py"
        mode: "0640"
      loop: "{{ rdmo_sites_effective }}"
      loop_control:
        label: "{{ rdmo_site.host }}"
        loop_var: rdmo_site

    # rdmo

    - name: Init RDMO sites
      become: true
      become_user: "{{ item.user | default(rdmo_user) }}"
      ansible.builtin.command:
        cmd: "{{ item.venv | default(rdmo_venv) }}/bin/python {{ item.app_path }}/manage.py upgrade"
        creates: "{{ item.app_path }}/static_root"
      loop: "{{ rdmo_sites_effective }}"
      loop_control:
        label: "{{ item.host }}"
      notify: Restart rdmo

  handlers:
    - name: Restart nginx
      ansible.builtin.systemd_service:
        name: nginx
        state: restarted

    - name: Restart rdmo
      ansible.builtin.systemd_service:
        name: "{{ item.service }}"
        enabled: true
        daemon_reload: true
        state: restarted
      loop: "{{ rdmo_sites_effective }}"
      loop_control:
        label: "{{ item.service }}"
