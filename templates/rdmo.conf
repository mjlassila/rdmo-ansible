server {
    server_name {{ rdmo_host }};

    root /var/www/{{ rdmo_host }};
    index index.html;

    location /static/ {
        alias {{ rdmo_app_path }}/static_root/;
    }

    location / {
        proxy_pass http://unix:/run/gunicorn/{{ rdmo_service }}/rdmo.sock;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl;
    listen 443 ssl;

    ssl_certificate /etc/letsencrypt/live/{{ rdmo_host }}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{ rdmo_host }}/privkey.pem;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
}

server {
    if ($host = {{ rdmo_host }}) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;

    server_name {{ rdmo_host }};
    return 404;
}
